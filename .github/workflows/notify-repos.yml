name: Notify registered repos of new version

# Triggered on every push to main that touches the template or install.sh.
# Opens a GitHub issue in each repo listed in repos.json to inform the
# engineer that a new configuration version is available.
#
# The engineer decides whether to apply it by running the
# "Update Claude Code and GitHub configuration" workflow in their repo.
#
# If an open notification issue already exists in a repo (same title),
# it is updated rather than duplicated.
#
# Requires secret NOTIFY_PAT: a fine-grained PAT with:
#   - Issues: write  (create and update issues)
#   - Metadata: read
# on every repo listed in repos.json.
# Without it the workflow logs a warning and skips — never blocks a push.

on:
  push:
    branches: [main]
    paths:
      - 'template/**'
      - 'install.sh'

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Gate on NOTIFY_PAT
        id: gate
        env:
          NOTIFY_PAT: ${{ secrets.NOTIFY_PAT }}
        run: |
          if [ -z "${NOTIFY_PAT}" ]; then
            echo "::warning::NOTIFY_PAT is not configured. Add a fine-grained PAT with 'Issues: write' on all registered repos to enable update notifications. Skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Install jq
        if: steps.gate.outputs.skip != 'true'
        run: sudo apt-get install -y jq

      - name: Build changelog summary
        if: steps.gate.outputs.skip != 'true'
        id: summary
        env:
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          TEMPLATE_REPO: ${{ github.repository }}
        run: |
          SHORT_SHA="${COMMIT_SHA::7}"
          COMMIT_URL="https://github.com/${TEMPLATE_REPO}/commit/${COMMIT_SHA}"

          # List files changed in this push (template/ and install.sh only)
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- template/ install.sh 2>/dev/null | head -20 || true)

          {
            echo "short_sha=${SHORT_SHA}"
            echo "commit_url=${COMMIT_URL}"
          } >> "$GITHUB_OUTPUT"

          # Build multiline changed files list for the issue body
          FILES_LIST=""
          while IFS= read -r f; do
            FILES_LIST="${FILES_LIST}- \`${f}\`"$'\n'
          done <<< "$CHANGED"
          echo "files_list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES_LIST" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Open or update issue in each repo
        if: steps.gate.outputs.skip != 'true'
        env:
          NOTIFY_PAT: ${{ secrets.NOTIFY_PAT }}
          TEMPLATE_REPO: ${{ github.repository }}
          SHORT_SHA: ${{ steps.summary.outputs.short_sha }}
          COMMIT_URL: ${{ steps.summary.outputs.commit_url }}
          FILES_LIST: ${{ steps.summary.outputs.files_list }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          ISSUE_TITLE="chore: new claude-github-config version available"

          ISSUE_BODY="## New configuration version available

A new version of the INTO AI Claude Code and GitHub configuration has been published.

**Commit:** [\`${SHORT_SHA}\`](${COMMIT_URL})
**Change:** ${COMMIT_MSG%%$'\n'*}

### Files updated in this version

${FILES_LIST}
### How to apply

Run the update workflow in this repo:

1. Go to **Actions** → **Update Claude Code and GitHub configuration**
2. Click **Run workflow**
3. A PR will open with the changes — review the diff and merge (or close to skip)

> If you are not ready to update, close this issue. You can always apply the update later by running the workflow manually.
"

          while IFS= read -r entry; do
            ORG=$(echo "$entry"  | jq -r '.org')
            REPO=$(echo "$entry" | jq -r '.repo')

            echo ""
            echo "Notifying $ORG/$REPO..."

            # Check for an existing open notification issue
            EXISTING_ISSUE=$(GH_TOKEN="$NOTIFY_PAT" gh api \
              "repos/$ORG/$REPO/issues?state=open&labels=type:chore" \
              --jq "[.[] | select(.title == \"$ISSUE_TITLE\")] | first | .number // empty" \
              2>/dev/null || true)

            if [ -n "$EXISTING_ISSUE" ]; then
              # Update existing issue with latest info
              GH_TOKEN="$NOTIFY_PAT" gh api \
                --method PATCH \
                "repos/$ORG/$REPO/issues/$EXISTING_ISSUE" \
                --field "body=$ISSUE_BODY" > /dev/null
              echo "Updated existing issue #$EXISTING_ISSUE in $ORG/$REPO."
            else
              # Open a new issue
              GH_TOKEN="$NOTIFY_PAT" gh issue create \
                --repo "$ORG/$REPO" \
                --title "$ISSUE_TITLE" \
                --body "$ISSUE_BODY" \
                --label "type:chore" \
                && echo "Issue opened in $ORG/$REPO." \
                || echo "::warning::Could not open issue in $ORG/$REPO (label may not exist — issue created without label)."
            fi

          done < <(jq -c '.[]' repos.json)
