name: Sync configuration to registered repos

# Manual trigger only — run this workflow when you want to push a configuration
# update to one or all registered repos. Each repo receives a PR it can review
# and merge (or close) at its own pace.
#
# Inputs:
#   repo  — target a single repo (e.g. "ldl-voice-eval-agent"), or leave blank
#           to sync all repos listed in repos.json.
#
# Requires secret SYNC_PAT: a fine-grained PAT with:
#   - Contents: write  (push the update branch)
#   - Pull requests: write  (open the PR)
#   - Metadata: read
# The PAT must have access to every repo listed in repos.json.

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Repo to sync (leave blank to sync all repos in repos.json)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Gate on SYNC_PAT
        id: gate
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          if [ -z "${SYNC_PAT}" ]; then
            echo "::error::SYNC_PAT is not configured. Add a fine-grained PAT with 'contents:write' and 'pull-requests:write' scopes to enable sync."
            exit 1
          fi

      - name: Checkout claude-github-config
        uses: actions/checkout@v5
        with:
          path: claude-github-config

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Sync repos
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
          TEMPLATE_REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          TARGET_REPO: ${{ inputs.repo }}
        run: |
          set -euo pipefail

          git config --global user.name  "claude-github-config[bot]"
          git config --global user.email "claude-github-config[bot]@users.noreply.github.com"

          # Filter repos.json by input if provided
          if [ -n "$TARGET_REPO" ]; then
            REPOS=$(jq -c --arg r "$TARGET_REPO" '.[] | select(.repo == $r)' claude-github-config/repos.json)
            if [ -z "$REPOS" ]; then
              echo "::error::Repo '$TARGET_REPO' not found in repos.json."
              exit 1
            fi
          else
            REPOS=$(jq -c '.[]' claude-github-config/repos.json)
          fi

          echo "$REPOS" | while IFS= read -r entry; do
            ORG=$(echo "$entry"            | jq -r '.org')
            REPO=$(echo "$entry"           | jq -r '.repo')
            PROJECT_NUMBER=$(echo "$entry" | jq -r '.project_number')

            echo ""
            echo "──────────────────────────────────────────"
            echo "Syncing $ORG/$REPO (board #$PROJECT_NUMBER)"
            echo "──────────────────────────────────────────"

            # Clone the target repo
            WORK_DIR="$(mktemp -d)"
            git clone --depth 1 "https://x-access-token:${SYNC_PAT}@github.com/$ORG/$REPO.git" "$WORK_DIR"

            # Run the installer in CI mode
            cd "$WORK_DIR"
            bash "$GITHUB_WORKSPACE/claude-github-config/install.sh" --ci

            # Check if anything changed
            if [ -z "$(git -C "$WORK_DIR" status --porcelain)" ]; then
              echo "No changes for $ORG/$REPO — already up to date."
              rm -rf "$WORK_DIR"
              cd "$GITHUB_WORKSPACE"
              continue
            fi

            # Create update branch and open PR
            BRANCH="chore/claude-github-config-sync-${COMMIT_SHA::7}"

            git -C "$WORK_DIR" checkout -b "$BRANCH"
            git -C "$WORK_DIR" add -A
            git -C "$WORK_DIR" commit -m "chore: sync claude-github-config (${COMMIT_SHA::7})"
            git -C "$WORK_DIR" push "https://x-access-token:${SYNC_PAT}@github.com/$ORG/$REPO.git" "$BRANCH"

            GH_TOKEN="$SYNC_PAT" gh pr create \
              --repo "$ORG/$REPO" \
              --base main \
              --head "$BRANCH" \
              --title "chore: sync claude-github-config (${COMMIT_SHA::7})" \
              --body "$(cat <<PRBODY
## claude-github-config sync

This PR was opened by the **Sync configuration to registered repos** workflow in [\`weareinto/claude-github-config\`](https://github.com/weareinto/claude-github-config).

**Source commit:** [\`${COMMIT_SHA::7}\`](https://github.com/$TEMPLATE_REPO/commit/$COMMIT_SHA)

### What to do

- **Review the diff carefully** — check that no project-specific customizations (e.g. \`doc/PROJECT.md\`, tech stack section in \`CONTRIBUTING.md\`) were overwritten.
- **Merge** if everything looks good.
- **Close without merging** to stay on the current version.
PRBODY
)" && echo "PR opened for $ORG/$REPO." \
              || echo "::warning::Failed to open PR for $ORG/$REPO — branch pushed, create PR manually."

            rm -rf "$WORK_DIR"
            cd "$GITHUB_WORKSPACE"
          done
