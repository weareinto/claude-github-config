name: Tag on release-PR merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  tag:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version from PR title
        id: version
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ "$PR_TITLE" =~ v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "Error: PR title '$PR_TITLE' does not contain a vX.Y.Z version"
            exit 1
          fi

      - name: Build tag annotation from CHANGELOG.md
        run: bash .github/scripts/extract-changelog-entry.sh "${{ steps.version.outputs.version }}" CHANGELOG.md "$RUNNER_TEMP/entry.md"

      - name: Create and push annotated tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists; skipping tag creation."
          else
            # Tag annotation stays minimal on purpose. The full changelog entry
            # becomes the GitHub Release body in the next step, which is the
            # canonical surface for "what shipped".
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Create GitHub Release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists; skipping release creation."
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes-file "$RUNNER_TEMP/entry.md" \
              --target main
          fi